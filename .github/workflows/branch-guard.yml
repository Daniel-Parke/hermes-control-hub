name: Branch Guard
on:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check if merge commit
        run: |
          MSG="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          echo "Commit: $MSG"
          echo "Author: $AUTHOR"
          if [[ "$MSG" != Merge* ]] && [[ "$MSG" != ci:* ]]; then
            echo "::error::Direct push to main detected!"
            echo "::error::Commit: $MSG"
            echo "::error::All changes must go through a PR from a feature branch."
            echo ""
            echo "To fix: create a PR from your branch to dev, then merge."
            exit 1
          fi
          echo "✓ Merge commit — allowed"
